# config file for training
#
# --- Data set Paths ---
#
path_to_read: "/home/nvidia/workplace/dataset/test/train"
path_to_val: "/home/nvidia/workplace/dataset/test/val"
path_to_save: "/home/nvidia/workplace/contrastive_loss_res/"
#
# --- Architecture ---
#
# Provide num_global_views & num_local_views
# We have consider num_global_views = 3, i.e., (start, mid, end) windows of the light curve
# Adjust the num_local_views based on VRAM capacity.
num_global_views: 3
num_local_views: 6
#
# --- Training Hyperparameters ---
#
# NOTE: global_batch_size = batch_size * num_gpus
# So, set the batch_size accordingly.
# e.g. batch_size = 128, num_gpus = 8, therefore, global_batch_size = 1024
#
temperature: 0.1      # Clustering loss emperature
patience: 10          # Early stopping patience
epochs: 250           # Number of training epochs
batch_size: 78        # per-GPU Batch size (adjust based on GPU memory)/ Just a batch size for CPU training
num_gpus: 8           # # of GPU instances to use for training. Set to 0 for CPU training.
#
# --- SK Parameters and Feature Queue ---
#
epsilon: 0.05                 # Provide the default value for SK algo. else use custom epsilon scheduler
sk_iterations: 3              # Number of iterations for SK algo.
start_queue_epoch: 500         # Epoch to start using the feature queue
use_episilon_scheduler: False  # Whether to use a custom epsilon scheduler for the SK algorithm. If False, use the default epsilon value.
start_eps: 0.05               # Starting epsilon value for the SK algorithm when using the custom scheduler. 
end_eps: 0.03                 # Ending epsilon value for the SK algorithm when using the custom scheduler.
warmup_epochs: 20             # Number of epochs over which to linearly decay epsilon from start_eps to end_eps when using the custom scheduler.
#
# --- Augmentation Parameters (Global & Local Views) ---
#
prob_noise: 0.5 
prob_outlier: 0.5
prob_binning: 0.5
bin_width_range: [1.0, 5.0]
drop_data_range: [0.01, 0.2]
noise_level_range: [0.01, 0.05]    
global_view_maxlens: {'g': 180, 'r': 300, 'i': 20} # GVs are of fixed length
local_view_maxlen_range: [90, 120] # LVs are randomly sampled                      
#
# --- Model Parameters ---
#
num_layers: 4          # Number of encoder layers
mjd: True              # Use MJD for positional encoding
base: 10000.0          # Base for positional encoding
d_model: 256           # Embedding dimension
num_heads: 4           # Number of attention heads
dff: 1024              # Feed-forward network dimension
rate: 0.1              # Dropout rate
use_band_info: True    # Use segment embeddings
time_scaling: 904.78   # Scaling factor for time indices in scaled positional encoding (288 * np.pi)
use_drop: True         # Use dropout
projection_dim: 128    # Projection head dimension 
apply_norm: False         # Whether to apply batch normalization in the projection head  
num_prototypes: 6    # Num of protypes for clustering in the SK algorithm. Adjust based on dataset size.
queue_length: 128      # Length of the feature queue 
#
# --- Optimizer and Scheduler ---
#
use_custom_schedule: True
#lr = 1e-4                              # Use initial_lr in train function if not using schedule. 
scheduler_type: "cosinedecay"           # Type of learning rate scheduler (e.g., "cosinedecay", "noam")
warmup_epochs_sch: 2                    # Number of warmup steps for Noam scheduler
n_training_samples: 20500                    # Total number of training samples 10000+3000+7500
# ---- parameters for cosine decay scheduler ----
initial_lr_cosine: 0.001                       # Initial learning rate for cosine decay scheduler
# ---- parameters for noam scheduler ----
#
# ---- parameters when use_custom_schedule=True -----
initial_lr: 0.001                       # initial_lr=lr, # Only if use_custom_schedule=False
# ------------------------------------------------------------------------------------
buffer_size: 10000                     # Shuffle buffer size for CPU training, 100000 for GPU training.
#
# --- Mlflow Configuration -----
#
mlflow_upload: True
mlflow_exp: "ASTRA(Pre-training)"
mlflow_uri: "http://localhost:8000" 

                      