# config file for downstram task

# --- General Task Configuration ---
# Task can be 'classification' or 'anomaly_detection'
task: classification
path_to_save: "/media3/majumder/emb/run_20260217_201958/resampled_data_120K/pre-training/" # Where to save plots and reports

# --- Mlflow Configuration -----
mlflow_upload: False
mlflow_name: "run_20260318_154848"
mlflow_exp: "ASTRA(Downstream Tasks)"

# --- Data Paths ---
# Paths to the embeddings and labels from your pre-trained model
# NOTE: training data and validation data is required for classification task. 
#       For anomaly detection task, only test data is required, else the training
#       data and validation data will be concatenated and used for anomaly detection model.
#       If you don't have separate test data for anomaly detection, you can comment out 
#       the 'test' path and the code will automatically concatenate the 'train' and 'val' 
#       data for anomaly detection.
path_to_data: 
  # test: "/home/nvidia/workplace/astra_storage/emb/k_distil_res/run_20260318_154848/teacher/all_dataset/finetuned/test/embeddings.h5"
  train: "/media3/majumder/emb/run_20260217_201958/resampled_data_120K/pre-training/train/embeddings.h5"
  val: "/media3/majumder/emb/run_20260217_201958/resampled_data_120K/pre-training/val/embeddings.h5"

# --- Classification Task Parameters ---
classification_params:
  
  bootstrap: True    # For bootstrapping results
  n_iterations: 50   # For bootstrapping results
  random_state: 42
  # List of classifier models to run. Can be 'lr' (Logistic Regression) , 'rf' (Random Forest), or 'mlp' (Multi-Layer Perceptron)
  models:
    - lr
    - knn

  # --- Hyperparameters for each model ---
  # These are passed directly to the scikit-learn constructors
  lr_params:
    C: 10.0
    max_iter: 2000
    solver: 'lbfgs'

  knn_params:
    k: 20
    temperature: 0.07
    batches: 1000

  rf_params:
    n_estimators: 150
    max_depth: 20
    n_jobs: 20 # Use all available CPU cores
    # min_samples_leaf: 10
    max_features: 0.35
  
  mlp_params:
    # hidden_layers: [256, 128] # Two hidden layers with 512 and 256 neurons
    # hidden_layers: None
    dropout_rate: 0.40        # Dropout rate for regularization
    learning_rate: 0.00005    # Learning rate for the Adam optimizer
    epochs: 50               # Maximum number of epochs to train for
    batch_size: 256           # Number of samples per training step
    patience: 10              # Patience for EarlyStopping




# --- Anomaly Detection Task Parameters ---
anomaly_detection_params:
  
  inspect_samples: 100   # Number of anomalies to inspect
  # List of models to run. Can be 'if' (Isolation Forest)
  models: 
    - 'if'
  
  # --- Hyperparameters for each model ---
  if_params:
    n_trees: 10000
    n_subsamples: 4096
    n_jobs: 30
    random_seed: 42
