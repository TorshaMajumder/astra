# config file for downstram task

# --- General Task Configuration ---
# Task can be 'classification' or 'anomaly_detection'
task: classification
path_to_save: "/home/nvidia/workplace/dataset/training_data/" # Where to save plots and reports

# --- Mlflow Configuration -----
mlflow_upload: True
mlflow_name: "20251231_140014_nvidia"
mlflow_exp: "ASTRA(Downstream Tasks)"

# --- Data Paths ---
# Paths to the embeddings and labels from your pre-trained model
path_to_data: "/home/nvidia/workplace/dataset/training_data/embeddings.h5"

# --- Classification Task Parameters ---
classification_params:
  
  bootstrap: False    # For bootstrapping results
  n_iterations: 100   # For bootstrapping results
  test_size: 0.2
  random_state: 42
  # List of classifier models to run. Can be 'lr' (Logistic Regression) or 'rf' (Random Forest)
  models:
    - mlp

  # --- Hyperparameters for each model ---
  # These are passed directly to the scikit-learn constructors
  lr_params:
    C: 0.1
    max_iter: 1000
    solver: 'lbfgs'

  rf_params:
    n_estimators: 250
    max_depth: 40
    n_jobs: -1 # Use all available CPU cores
    min_samples_leaf: 10
    max_features: 0.1
  
  mlp_params:
    hidden_layers: [256, 128] # Two hidden layers with 256 and 128 neurons
    dropout_rate: 0.3         # Dropout rate for regularization
    learning_rate: 0.0001     # Learning rate for the Adam optimizer
    epochs: 100               # Maximum number of epochs to train for
    batch_size: 256           # Number of samples per training step
    patience: 10             # Patience for EarlyStopping




# --- Anomaly Detection Task Parameters ---
anomaly_detection_params:
  
  inspect_samples: 10   # Number of anomalies to inspect
  # List of models to run. Can be 'if' (Isolation Forest)
  models: 
    - 'if'
  
  # --- Hyperparameters for each model ---
  if_params:
    n_jobs: 10
    random_seed: 42
