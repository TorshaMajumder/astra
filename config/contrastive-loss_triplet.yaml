# config file for training
#
# --- Data set Paths ---
#
path_to_read: "/home/nvidia/workplace/dataset/test/train/"
path_to_val: "/home/nvidia/workplace/dataset/test/val/"
path_to_save: "/home/nvidia/workplace/contrastive_loss_res/"
#
# --- Architecture ---
#
# Provide n_views=3 for Triplet model/Provide n_views=2 for Siamese model
#
n_views: 3            # Anchor, Canonical Positive, Hard Positive --- Triplet ---
#
# --- Training Hyperparameters ---
#
# NOTE: global_batch_size = batch_size * num_gpus
# So, set the batch_size accordingly.
# e.g. batch_size = 128, num_gpus = 8, therefore, global_batch_size = 1024
#
temperature: 0.1      # Contrastive loss temperature
patience: 20          # Early stopping patience
epochs: 250           # Number of training epochs
batch_size: 78        # per-GPU Batch size (adjust based on GPU memory)/ Just a batch size for CPU training
num_gpus: 8           # # of GPU instances to use for training. Set to 0 for CPU training.
#
# --- Augmentation Parameters (Anchor, Canonical Positive, Hard Positive) ---
#
apply_white_noise: [True, False, True]   # Add white noise
noise_levels : [0.05, 0.0, 0.10]         # Noise level for each view
apply_binning: [False, False, True]
apply_outlier: [False, False, True]
#
# Sequence lengths for Anchor, Canonical Positive, Hard Positive
#
maxlens:
  - {'g': 300, 'r': 350, 'i': 50}  # Anchor
  - {'g': 150, 'r': 175, 'i': 25}  # Canonical Positive
  - {'g': 300, 'r': 350, 'i': 50}  # Hard Positive
bin_widths: [5, 5, 5]
drop_rates: [0.0, 0.0, 0.50]
#
# --- Transformer Model Parameters ---
#
num_layers: 4          # Number of encoder layers
mjd: True              # Use MJD for positional encoding
base: 10000.0          # Base for positional encoding
d_model: 512           # Embedding dimension
num_heads: 8           # Number of attention heads
dff: 2048              # Feed-forward network dimension
rate: 0.1              # Dropout rate
use_band_info: True    # Use segment embeddings
time_scaling: 904.78   # Scaling factor for time indices in positional encoding (288 * np.pi)
use_drop: True         # Use dropout
projection_dim: 256    # Projection head dimension 
#
# --- Optimizer and Scheduler ---
#
initial_lr: 0.0001    # initial_lr=lr, # Only if use_custom_schedule=False
#lr = 1e-4            # Use initial_lr in train function if not using schedule. 
use_custom_schedule: True
warmup_steps: 1000
buffer_size: 100000   # Shuffle buffer size for CPU training, 100000 for GPU training.
#
# --- Mlflow Configuration -----
#
mlflow_upload: True
mlflow_exp: "ASTRA(Pre-training)"

                      



